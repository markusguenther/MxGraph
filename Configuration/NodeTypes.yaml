'Sandstorm.MxGraph:Diagram':
  superTypes:
    'Neos.Neos:Content': true
    # provide alignment options
    'Neos.NodeTypes.BaseMixins:ImageAlignmentMixin': true
    # provide link options
    'Neos.NodeTypes.BaseMixins:LinkMixin': true

    # TODO: just for testing to be able to use the diagram in the content area
    'Neos.Demo:Constraint.Content.Main': true
  options:
    nodeCreationHandlers:
      mxGraph:
        factoryClassName: Sandstorm\MxGraph\Factory\DiagramCreationHandlerFactory
  ui:
    label: Diagram
    icon: icon-picture
    position: 300
  properties:
    # the diagram as svg - if empty, the dummy image is shown
    diagramSvgText:
      type: string
    # the diagram xml source
    diagramSource:
      ui:
        inspector:
          editor: Sandstorm.MxGraph/Editors/DiagramEditor
          group: 'default'
    # global unique identifier for the diagram
    diagramIdentifier:
      type: string
      ui:
        label: i18n
        # when changing the identifier to an existing one, the original diagram's content will be copied into this node -> reload to see the changes
        reloadIfChanged: true
        inspector:
          group: 'default'
          editor: 'Sandstorm.LazyDataSource/Inspector/Editors/DataSourceSelectEditor'
          editorOptions:
            placeholder: Create new or select ...
            dataSourceIdentifier: drawio-diagram-identifier
            dataSourceDisableCaching: true
        help:
          message: i18n
        showInCreationDialog: true

    # because the diagram is basically an image, we want secondary properties for a11y, etc.
    alternativeText:
      type: string
      defaultValue: ''
      ui:
        # TODO: add translation
        label: i18n
        inspector:
          group: 'default'
    title:
      type: string
      defaultValue: ''
      ui:
        # TODO: add translation
        label: i18n
        inspector:
          group: 'default'
    caption:
      type: string
      defaultValue: ''
      ui:
        inlineEditable: true
        inline:
          editorOptions:
            autoparagraph: true
            # TODO: add translation
            placeholder: i18n
            linking:
              anchor: true
              title: true
              relNofollow: true
              targetBlank: true
            formatting:
              strong: true
              em: true
              sub: true
              sup: true
              pre: true
              underline: true
              strikethrough: true
              removeFormat: true
              left: true
              right: true
              center: true
              justify: true
              a: true

    # override the default image alignment
    alignment:
      ui:
        # TODO: add translation
        label: i18n
        inspector:
          group: 'default'

    # override the default link
    link:
      ui:
        inspector:
          group: 'default'
